services:
  art-db:
    image: mongo:latest
    container_name: art-movements-db
    ports:
      - "${DB_PORT}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongo-data:/data/db
    networks:
      - art-network

  art-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: art-movements-api
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - MONGO_URL=${MONGO_URL}
      - PORT=${API_PORT}
    depends_on:
      - art-db
    networks:
      - art-network

networks:
  art-network:
    driver: bridge

volumes:
  mongo-data: