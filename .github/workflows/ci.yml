name: CI / Playwright Tests
on:
  push:
    branches: [ main, master, develop, test/playwright-setup ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install BE dependencies
        run: cd backend && npm ci
      - name: Run Jest
        run: cd backend && npm test

  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install FE dependencies
        run: cd frontend && npm ci
      - name: Type Check (Vue-tsc)
        run: cd frontend && npm run build

  playwright-e2e:
    needs: [backend-unit-tests, frontend-validation]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test --pass-with-no-tests
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30